name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      # Step 2: Secret Scanning (Gitleaks)
      - name: Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      # Step 3: SAST (Semgrep)
      - name: SAST - Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: true
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
        continue-on-error: true
      
      # Step 4: Upload SAST results to GitHub
      - name: Upload SAST results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif
      
      # Step 5: Dependency Scanning
      - name: Dependency Scanning - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      # Step 6: Upload dependency scan results
      - name: Upload dependency results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: 'Trivy'
      
      # Step 7: Check for blocking issues
      - name: Check for blocking issues
        run: |
          # Check if Gitleaks found secrets
          if [ -f .gitleaks ]; then
            echo "❌ BLOCKING: Secrets detected in code"
            exit 1
          fi
          
          echo "✅ All security checks passed"
      
      # Step 8: Create PR comment with results
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔒 Security Scan Results\n\n';
            
            comment += '✅ Secret Scanning: Passed\n';
            comment += '✅ SAST (Semgrep): Check details tab\n';
            comment += '✅ Dependency Scan: Check details tab\n\n';
            comment += '**Note:** Click "Details" tab above to view full results';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
